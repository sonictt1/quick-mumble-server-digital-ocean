#cloud-config

# Update package database
package_update: true
package_upgrade: true

# Install required packages
packages:
  - curl
  - git
  - htop
  - ufw
  - mumble-server

# Create users
users:
  - name: murmur
    system: true
    shell: /bin/false
    home: /var/lib/mumble-server
    groups: mumble-server

# Configure firewall
runcmd:
  # Raise sshd MaxStartups so rapid retry loops don't hit the default cap of 10
  - sed -i 's/^#*MaxStartups.*/MaxStartups 30:50:100/' /etc/ssh/sshd_config
  - grep -q '^MaxStartups' /etc/ssh/sshd_config || echo 'MaxStartups 30:50:100' >> /etc/ssh/sshd_config
  - systemctl reload ssh || systemctl reload sshd

  # Configure firewall
  - ufw allow ssh
  - ufw --force enable
  
  # Update and upgrade packages
  - apt update -y && apt upgrade -y

  # Configure Murmur
  - systemctl stop mumble-server
  - mkdir -p /etc/mumble-server
  - mkdir -p /var/lib/mumble-server
  - mkdir -p /var/log/mumble-server
  - chown -R mumble-server:mumble-server /var/lib/mumble-server
  - chown -R mumble-server:mumble-server /var/log/mumble-server

  # Start and enable Murmur
  - grep -q '^START=yes' /etc/default/mumble-server 2>/dev/null || echo 'START=yes' >> /etc/default/mumble-server
  - systemctl enable mumble-server
  - systemctl start mumble-server

# Final commands after everything is set up
final_message: |
  Murmur server setup complete!
  Your Murmur server is ready at: YOUR_DROPLET_IP:64738
  Connect using any Mumble client.