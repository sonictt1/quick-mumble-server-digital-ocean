# Mumble Server Configuration
# Concise version with essential settings and simplified comments

# Database Configuration
database=/var/lib/mumble-server/mumble-server.sqlite
#dbDriver=postgresql               
#dbUsername=
#dbPassword=
#dbHost=
#dbPort=
#sqlite_wal=0                      
# Administration Interface
ice="tcp -h 127.0.0.1 -p 6502"    
#icesecretread=                    
icesecretwrite=                    

# Logging
#logfile=mumble-server.log         
#pidfile=                          

# Server Identity
welcometext="<br />Welcome to this server running <b>Mumble</b>.<br />Enjoy your stay!<br />"
#welcometextfile=                  
registerName=Ursine Server
#registerPassword=secret           
#registerUrl=http://www.mumble.info/
#registerHostname=                 
#registerLocation=                 

# Network Settings
#Default Port
#port=64738                         
port=64738
#host=                             
#serverpassword=                   
bandwidth=558000                   
allowping=true                    

# User Limits & Timeouts
users=100                          
#usersperchannel=0                 # Max users per channel (0 = no limit)
#timeout=30                        # Disconnect timeout for hung clients (seconds)

# Rate Limiting
messageburst=5                     
messagelimit=1                     
#pluginmessagelimit=1              # Plugin messages per second
#pluginmessageburst=5              # Plugin message burst limit

# Audio Settings
#opusthreshold=0                   # Opus usage threshold (0=always, 100=all clients)

# Channel Settings
#channelnestinglimit=10            # Maximum channel nesting depth
#channelcountlimit=1000            # Maximum channels per server (0 = unlimited)
#channelname=[ \\-=\\w\\#\\[\\]\\{\\}\\(\\)\\@\\|]+  # Channel name regex
#username=[-=\\w\\[\\]\\{\\}\\(\\)\\@\\|\\.]+         # Username regex
#defaultchannel=0                  # Default channel ID for new users
#rememberchannel=true              # Remember user's last channel
#rememberchannelduration=0         # How long to remember (0 = forever)

# Message Settings
#textmessagelength=5000            # Max text message length
#imagemessagelength=131072         # Max message length with images
#allowhtml=true                    # Allow HTML in messages/comments

# Logging & History
#logdays=31                        # Days to keep server logs (-1 = disable)

# Service Discovery
#bonjour=true                      # Announce via Bonjour/mDNS

# SSL/TLS Settings
#sslCert=                          # SSL certificate file path
#sslKey=                           # SSL private key file path
#sslPassPhrase=                    # Key file passphrase
#sslCA=                            # Certificate authority bundle
#sslDHParams=@ffdhe2048            # Diffie-Hellman parameters
#sslCiphers=EECDH+AESGCM:EDH+aRSA+AESGCM:DHE-RSA-AES256-SHA:DHE-RSA-AES128-SHA:AES256-SHA:AES128-SHA

# Security Settings
#uname=                            # Run as this user (if started as root)
#obfuscate=false                   # Randomize IP addresses in logs
#certrequired=false                # Require client certificates
#sendversion=true                  # Send server version to clients
#suggestVersion=                   # Minimum recommended client version
#suggestPositional=                # Recommend positional audio (true/false/blank)
#suggestPushToTalk=                # Recommend push-to-talk (true/false/blank)
#legacypasswordhash=false          # Use legacy password hashing (insecure)
#kdfiterations=-1                  # Override PBKDF2 iterations (-1 = auto)

# Auto-ban System (prevents connection flooding)
autobanAttempts=10                 
autobanTimeframe=120               
autobanTime=300                    
autobanSuccessfulConnections=false 

# Advanced Logging
#loggroupchanges=false             # Log group membership changes
#logaclchanges=false               # Log ACL permission changes

# Recording & Listeners
#allowRecording=true               # Allow client recording
#rollingStatsWindow=300            # Packet stats window (seconds, 0=disable)
#listenersperchannel=-1            # Max listeners per channel (-1=unlimited)
#listenersperuser=-1               # Max listeners per user (-1=unlimited)

# External Authentication
#forceExternalAuth=false           # Force external authentication

# Ice Configuration (keep at end of file)
[Ice]
Ice.Warn.UnknownProperties=1
Ice.MessageSizeMax=65536