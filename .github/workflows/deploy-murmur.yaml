name: Deploy Murmur and obtain Let's Encrypt certificate

on:
  workflow_dispatch:
    inputs:
      ssh_port:
        description: 'SSH port'
        required: true
        default: '22'
      server_image:
        description: 'Droplet image (e.g., ubuntu-22-04-x64)'
        required: false
        default: 'ubuntu-22-04-x64'
      server_size:
        description: 'Droplet size (e.g., s-1vcpu-1gb)'
        required: false
        default: 's-1vcpu-1gb'
      server_name:
        description: 'Droplet name (server-name)'
        required: false
        default: 'sonic-bear-voice-chat'
      mumble_server_port:
        description: 'Mumble server port (defaults to 64869)'
        required: false
        default: '64869'
      admin_username:
        description: 'Admin SSH username'
        required: true
        default: 'root'
      domain:
        description: 'Domain (example.com)'
        required: true
        default: 'sonictt1.com'
      email:
        description: 'Email for Lets Encrypt registration'
        required: true
        default: 'certbot+sonictt1@proton.me'
      region:
        description: 'DigitalOcean region (e.g., nyc3, sfo2)'
        required: true
        default: 'nyc3'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install and authenticate doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Make scripts executable
        run: |
          chmod +x ./reserve_ip_dns_record.sh || true
          chmod +x ./inflate_murmur.sh || true
          chmod +x ./letsencrypt_cert_script.sh || true

      - name: Setup SSH identity from secret
        run: |
          # The SSH private key is provided via the repository secret `DO_SSH_PRIVATE_KEY`.
          mkdir -p ~/.ssh
          cat > ~/.ssh/do_ssh_key <<'EOF'
          ${{ secrets.DO_SSH_PRIVATE_KEY }}
          EOF
          chmod 600 ~/.ssh/do_ssh_key

      - name: Reserve IP and DNS
        id: reserve
        run: |
          set -euo pipefail
          echo "Running reserve_ip_dns_record.sh..."
          RESERVED_IP=$(./reserve_ip_dns_record.sh)
          echo "reserved_ip=$RESERVED_IP" >> $GITHUB_OUTPUT

      - name: Generate UTC timestamp
        id: ts
        run: |
          set -euo pipefail
          echo "timestamp=$(date -u +'%Y-%m-%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Inflate Murmur
        id: inflate
        run: |
          set -euo pipefail
          echo "Inflating murmur with reserved IP: ${RESERVED_IP:-${{ steps.reserve.outputs.reserved_ip }}}"
          # Use timestamp generated in prior step and determine mumble port
          TAGS="timestamp-${{ steps.ts.outputs.timestamp }}"
          SERVER_NAME="${{ github.event.inputs.server_name }}"
          MUMBLE_PORT="${{ github.event.inputs.mumble_server_port }}"

          DROPLET_ID=$(./inflate_murmur.sh --region "${{ github.event.inputs.region }}" --image "${{ github.event.inputs.server_image }}" --size "${{ github.event.inputs.server_size }}" --name "$SERVER_NAME" --reserved-ip "${{ steps.reserve.outputs.reserved_ip }}" --admin "${{ github.event.inputs.admin_username }}" --identity "$HOME/.ssh/do_ssh_key" --ssh-port "${{ github.event.inputs.ssh_port }}" --ssh-key "${{ secrets.DO_SSH_KEY_ID }}" --domain "${{ github.event.inputs.domain }}" --mumble-ini ./mumble-server.ini --database ./mumble-server.sqlite --mumble-port "$MUMBLE_PORT" --tags "$TAGS")
          echo "droplet_id=$DROPLET_ID" >> $GITHUB_OUTPUT

      - name: Obtain Let's Encrypt certificate
        run: |
          set -euo pipefail
          echo "Requesting cert for mumble.${{ github.event.inputs.domain }} on ${{ steps.reserve.outputs.reserved_ip }}"
          ./letsencrypt_cert_script.sh --reserved-ip "${{ steps.reserve.outputs.reserved_ip }}" --droplet-id "${{ steps.inflate.outputs.droplet_id }}" --domain "${{ github.event.inputs.domain }}" --email "${{ github.event.inputs.email }}" --ssh-identity-file "$HOME/.ssh/do_ssh_key" --ssh-port "${{ github.event.inputs.ssh_port }}" --admin-username "${{ github.event.inputs.admin_username }}"
