name: Deploy Murmur and obtain Let's Encrypt certificate

on:
  workflow_dispatch:
    inputs:
      ssh_port:
        description: 'SSH port'
        required: true
        default: '22'
      server_image:
        description: 'Droplet image (e.g., ubuntu-22-04-x64)'
        required: false
        default: 'ubuntu-22-04-x64'
      server_size:
        description: 'Droplet size (e.g., s-1vcpu-1gb)'
        required: false
        default: 's-1vcpu-1gb'
      server_name:
        description: 'Droplet name (server-name)'
        required: false
        default: 'sonic-bear-voice-chat'
      mumble_server_port:
        description: 'Mumble server port (defaults to 64738)'
        required: false
        default: '64738'
      admin_username:
        description: 'Admin SSH username'
        required: true
        default: 'sonic'
      domain:
        description: 'Domain (example.com)'
        required: true
        default: 'sonictt1.com'
      subdomain:
        description: 'Subdomain for cert and connecting (e.g., mumble)'
        required: true
        default: 'voice'
      use_reserved_ip:
        description: 'Whether to create and use a reserved/floating IP (true/false)'
        required: false
        default: 'true'
      email:
        description: 'Email for Lets Encrypt registration'
        required: true
        default: 'sonictt1@proton.me'
      region:
        description: 'DigitalOcean region (e.g., nyc3, sfo2)'
        required: true
        default: 'nyc3'

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      reserved_ip: ${{ steps.reserve.outputs.reserved_ip }}
      droplet_id: ${{ steps.inflate.outputs.droplet_id }}
      droplet_ip: ${{ steps.inflate.outputs.droplet_ip }}
    steps:
      - uses: actions/checkout@v4

      - name: Install and authenticate doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Make scripts executable
        run: |
          chmod +x ./reserve_ip_dns_record.sh || true
          chmod +x ./inflate_murmur.sh || true
          chmod +x ./letsencrypt_cert_script.sh || true

      - name: Setup SSH identity from secret
        run: |
          # The SSH private key is provided via the repository secret `DO_SSH_PRIVATE_KEY`.
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/do_ssh_key
          chmod 600 ~/.ssh/do_ssh_key

      

      - name: Reserve IP and DNS
        id: reserve
        if: ${{ github.event.inputs.use_reserved_ip == 'true' }}
        run: |
          set -euo pipefail
          echo "Running reserve_ip_dns_record.sh..."
          RESERVED_IP=$(./reserve_ip_dns_record.sh --domain "${{ github.event.inputs.domain }}" --subdomain "${{ github.event.inputs.subdomain }}" --region "${{ github.event.inputs.region }}")
          echo "Reserved IP: $RESERVED_IP"
          echo "reserved_ip=$RESERVED_IP" >> $GITHUB_OUTPUT

      - name: Generate UTC timestamp
        id: ts
        run: |
          set -euo pipefail
          echo "timestamp=$(date -u +'%Y-%m-%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Inflate Murmur
        id: inflate
        run: |
          set -euo pipefail
          RES_IP='${{ steps.reserve.outputs.reserved_ip }}'
          USE_RESERVED='${{ github.event.inputs.use_reserved_ip }}'
          if [ "$USE_RESERVED" = 'true' ] && [ -n "$RES_IP" ]; then
            echo "Inflating murmur with reserved IP: $RES_IP"
          else
            echo "Inflating murmur with droplet public IP (no reserved IP)"
          fi
          
          TS='${{ steps.ts.outputs.timestamp }}'
          TAGS="timestamp-$TS"
          SERVER_NAME='${{ github.event.inputs.server_name }}'
          MUMBLE_PORT='${{ github.event.inputs.mumble_server_port }}'

          OUTFILE=/tmp/inflate_output.txt
          
          # Build the inflate_murmur.sh command, conditionally including --reserved-ip
          INFLATE_CMD=(./inflate_murmur.sh \
            --region "${{ github.event.inputs.region }}" \
            --image "${{ github.event.inputs.server_image }}" \
            --size "${{ github.event.inputs.server_size }}" \
            --name "$SERVER_NAME" \
            --admin "${{ github.event.inputs.admin_username }}" \
            --identity "$HOME/.ssh/do_ssh_key" \
            --ssh-port "${{ github.event.inputs.ssh_port }}" \
            --ssh-key "${{ secrets.DO_SSH_KEY_ID }}" \
            --ssh-public-key "${{ vars.SSH_PUBLIC_KEY }}" \
            --domain "${{ github.event.inputs.domain }}" \
            --mumble-ini ./mumble-server.ini \
            -l "$MUMBLE_PORT" \
            --verbose \
            --tags "$TAGS")
          
          # Only add --reserved-ip if it's set and use_reserved_ip is true
          if [ -n "$RES_IP" ]; then
            INFLATE_CMD+=(--reserved-ip "$RES_IP")
          fi
          
          # Run script and capture stdout+stderr for debugging
          if "${INFLATE_CMD[@]}" >"$OUTFILE" 2>&1; then
            # Extract droplet info emitted by the script (|| true guards against grep no-match under set -e)
            DROPLET_ID=$(grep -E '^DROPLET_ID=' "$OUTFILE" | tail -n1 | cut -d'=' -f2- || true)
            DROPLET_IP=$(grep -E '^DROPLET_IP=' "$OUTFILE" | tail -n1 | cut -d'=' -f2- || true)
            if [ -z "$DROPLET_ID" ] || [ -z "$DROPLET_IP" ]; then
              echo "ERROR: Could not parse DROPLET_ID/DROPLET_IP from inflate output:" >&2
              cat "$OUTFILE" >&2
              exit 1
            fi
            echo "droplet_id=$DROPLET_ID" >> $GITHUB_OUTPUT
            echo "droplet_ip=$DROPLET_IP" >> $GITHUB_OUTPUT
          else
            echo "inflate_murmur.sh failed; output follows:" >&2
            sed -n '1,400p' "$OUTFILE" >&2 || true
            exit 1
          fi
          sleep 90 # Wait a bit for the droplet to be fully ready before SSH attempts

      - name: SSH debug connection
        run: |
          set -euo pipefail
          # Choose target IP: reserved IP if requested, otherwise the droplet's public IP
          if [ '${{ github.event.inputs.use_reserved_ip }}' = 'true' ]; then
            TARGET_IP='${{ steps.reserve.outputs.reserved_ip }}'
          else
            TARGET_IP='${{ steps.inflate.outputs.droplet_ip }}'
          fi
          echo "Running SSH connectivity test to ${ADMIN_USERNAME:=${{ github.event.inputs.admin_username }}}@${TARGET_IP}"
          SSH_OPTS=( -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -i "$HOME/.ssh/do_ssh_key" -p "${{ github.event.inputs.ssh_port }}" -vvv )

          # Retry with backoff in case server is overwhelmed (Exceeded MaxStartups)
          attempt=1; max_attempts=10; delay=5
          while true; do
            echo "SSH connectivity attempt $attempt..."
            if /usr/bin/ssh "${SSH_OPTS[@]}" "${{ github.event.inputs.admin_username }}"@"${TARGET_IP}" 'echo SSH_OK' > /tmp/ssh_debug.txt 2>&1; then
              echo "SSH_OK"
              break
            fi
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "SSH debug connection failed after $attempt attempts:" >&2
              sed -n '1,400p' /tmp/ssh_debug.txt >&2
              exit 1
            fi
            echo "SSH connection failed; retrying in ${delay}s..." >&2
            sleep "$delay"
            attempt=$((attempt+1))
            delay=$(( delay * 2 > 120 ? 120 : delay * 2 ))
          done

      - name: Obtain Let's Encrypt certificate
        run: |
          set -euo pipefail
          # Determine which IP to target for cert issuance
          if [ '${{ github.event.inputs.use_reserved_ip }}' = 'true' ]; then
            TARGET_IP='${{ steps.reserve.outputs.reserved_ip }}'
          else
            TARGET_IP='${{ steps.inflate.outputs.droplet_ip }}'
          fi
          echo "Requesting cert for ${{ github.event.inputs.subdomain }}.${{ github.event.inputs.domain }} on ${TARGET_IP}"
          ./letsencrypt_cert_script.sh --droplet-ip "${TARGET_IP}" --droplet-id "${{ steps.inflate.outputs.droplet_id }}" --domain "${{ github.event.inputs.domain }}" --subdomain "${{ github.event.inputs.subdomain }}" --email "${{ github.event.inputs.email }}" --ssh-identity-file "$HOME/.ssh/do_ssh_key" --ssh-port "${{ github.event.inputs.ssh_port }}" --admin-username "${{ github.event.inputs.admin_username }}"

      - name: Upload and install sqlite DB
        run: |
          set -euo pipefail
          echo "Uploading local DB checksum..."
          LOCAL_DB_CHECKSUM=$(sha256sum "$GITHUB_WORKSPACE/mumble-server.sqlite" | awk '{print $1}')
          echo "Local checksum: $LOCAL_DB_CHECKSUM"
          # Determine which IP to target for uploads/remote actions
          if [ '${{ github.event.inputs.use_reserved_ip }}' = 'true' ]; then
            TARGET_IP='${{ steps.reserve.outputs.reserved_ip }}'
          else
            TARGET_IP='${{ steps.inflate.outputs.droplet_ip }}'
          fi
          SSH_PORT='${{ github.event.inputs.ssh_port }}'
          ADMIN_USERNAME='${{ github.event.inputs.admin_username }}'

          # small pause to allow SSHD settle if server is new
          sleep 5

          # retry helper (first arg is max attempts, default 6)
          run_with_retry() {
            local max_attempts=${1:-6}
            shift || true
            local attempt=1
            local delay=5
            while true; do
              "$@" && return 0
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Command failed after $attempt attempts: $*" >&2
                return 1
              fi
              echo "Command failed; retrying in ${delay}s..." >&2
              sleep "$delay"
              attempt=$((attempt+1))
              delay=$((delay*2))
            done
          }

          SCP_OPTS=( -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -o BatchMode=yes -o ConnectTimeout=10 -P "$SSH_PORT" -i "$HOME/.ssh/do_ssh_key" )

          echo "Uploading DB to ${ADMIN_USERNAME}@${TARGET_IP}:/tmp..."
          run_with_retry 6 scp "${SCP_OPTS[@]}" "$GITHUB_WORKSPACE/mumble-server.sqlite" ${ADMIN_USERNAME}@${TARGET_IP}:/tmp/mumble-server.sqlite
          echo "Upload complete; waiting for SSH daemon to settle..."
          sleep 15

          # Verify checksum with aggressive retries (SSH daemon may still be settling)
          echo "Checking remote tmp checksum..."
          REMOTE_TMP_CHECKSUM=""
          checksum_ok=false
          attempt=1; max_attempts=10; delay=10
          while true; do
            # Do NOT use 2>&1 here — SSH errors must NOT bleed into the variable
            # Use sudo for the remote checksum so the check works even if the uploaded
            # file is owned by root or otherwise not world-readable.
            if REMOTE_TMP_CHECKSUM=$(ssh -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -o BatchMode=yes -o ConnectTimeout=15 -p "$SSH_PORT" -i "$HOME/.ssh/do_ssh_key" ${ADMIN_USERNAME}@${TARGET_IP} "sudo sha256sum /tmp/mumble-server.sqlite 2>/dev/null | cut -d ' ' -f1"); then
              checksum_ok=true
              break
            fi
            REMOTE_TMP_CHECKSUM=""
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "WARNING: Could not verify checksum after $attempt attempts; proceeding with install anyway (will verify via sqlite3)" >&2
              break
            fi
            echo "Checksum check failed; retrying in ${delay}s (attempt $attempt/$max_attempts)..." >&2
            sleep "$delay"
            attempt=$((attempt+1))
            delay=$((delay + 10))
          done

          if [ "$checksum_ok" = "true" ]; then
            if [ "$REMOTE_TMP_CHECKSUM" != "$LOCAL_DB_CHECKSUM" ]; then
              echo "ERROR: checksum mismatch — remote: $REMOTE_TMP_CHECKSUM, local: $LOCAL_DB_CHECKSUM" >&2
              exit 1
            fi
            echo "Remote tmp checksum: $REMOTE_TMP_CHECKSUM (match!)"
          else
            echo "Skipped checksum verification; will verify after install via sqlite3"
          fi

          # capture remote install script so it can be re-sent on retries
          REMOTE_SCRIPT=$(cat <<'REMOTE_EOF'
          set -euo pipefail
          # Runtime variables - keep in sync with `mumble-server.ini` (uname)
          MUMBLE_USER="mumble-server"
          MUMBLE_GROUP="mumble-server"
          DB_DEST="/var/lib/mumble-server"
          LIVE_DB="$DB_DEST/mumble-server.sqlite"
          REPO_DB="/tmp/mumble-server.sqlite"

          # Ensure mumble-server is installed
          if ! dpkg -l mumble-server 2>/dev/null | grep -q '^ii'; then
            echo "mumble-server not installed; installing..."
            sudo apt-get update -qq
            sudo apt-get install -y software-properties-common
            sudo add-apt-repository -y universe
            sudo apt-get update -qq
            sudo apt-get install -y mumble-server sqlite3
          fi

          # Stop murmur before touching the DB
          sudo systemctl stop mumble-server || true
          sleep 2

          # Ensure uploaded repo DB is owned and readable by the admin user for verification
          if [ -f "$REPO_DB" ]; then
            sudo chown "$(whoami):$(id -gn)" "$REPO_DB" || true
            sudo chmod 640 "$REPO_DB" || true
          fi

          # Ensure destination directory exists with correct ownership
          sudo mkdir -p "$DB_DEST"
          sudo chown "$MUMBLE_USER:$MUMBLE_GROUP" "$DB_DEST"
          sudo chmod 750 "$DB_DEST"

          # Copy the repo DB directly into place
          sudo cp -f "$REPO_DB" "$LIVE_DB"
          sudo chown "$MUMBLE_USER:$MUMBLE_GROUP" "$LIVE_DB"
          sudo chmod 660 "$LIVE_DB"

          echo "[DB VERIFY] DB file at $LIVE_DB:"
          sudo ls -lh "$LIVE_DB"

          # Ensure START=yes so the Ubuntu SysV EnvironmentFile gate doesn't block the service
          grep -q '^START=yes' /etc/default/mumble-server 2>/dev/null || \
            echo 'START=yes' | sudo tee -a /etc/default/mumble-server >/dev/null

          # Clear any stale PID or failed-unit state
          sudo rm -f /var/run/mumble-server/mumble-server.pid \
                     /run/mumble-server/mumble-server.pid
          sudo systemctl reset-failed mumble-server || true

          sudo systemctl start mumble-server
          sleep 3
          if ! sudo systemctl is-active --quiet mumble-server; then
            echo "ERROR: mumble-server failed to start" >&2
            sudo systemctl status mumble-server --no-pager >&2 || true
            sudo journalctl -u mumble-server -n 30 --no-pager >&2 || true
            exit 1
          fi
          echo "[OK] mumble-server is running"

          # Only clean up the uploaded file after confirmed success
          rm -f "$REPO_DB"
          REMOTE_EOF
          )

          attempt=1; max_attempts=6; delay=5
          while true; do
            echo "Running remote install attempt $attempt..."
            printf '%s\n' "$REMOTE_SCRIPT" | ssh -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -o BatchMode=yes -o ConnectTimeout=10 -p "$SSH_PORT" -i "$HOME/.ssh/do_ssh_key" ${ADMIN_USERNAME}@${TARGET_IP} bash -s && break
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "ERROR: remote install failed after $attempt attempts" >&2
              exit 1
            fi
            echo "Remote install failed; retrying in ${delay}s..." >&2
            sleep "$delay"
            attempt=$((attempt+1))
            delay=$((delay*2))
          done

      - name: Diagnose mumble-server state
        run: |
          set -euo pipefail
          # Choose target IP: reserved IP if requested, otherwise the droplet's public IP
          if [ '${{ github.event.inputs.use_reserved_ip }}' = 'true' ]; then
            TARGET_IP='${{ steps.reserve.outputs.reserved_ip }}'
          else
            TARGET_IP='${{ steps.inflate.outputs.droplet_ip }}'
          fi
          SSH_PORT='${{ github.event.inputs.ssh_port }}'
          ADMIN_USERNAME='${{ github.event.inputs.admin_username }}'
          MUMBLE_PORT='${{ github.event.inputs.mumble_server_port }}'
          ssh -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -o BatchMode=yes -o ConnectTimeout=10 \
            -p "$SSH_PORT" -i "$HOME/.ssh/do_ssh_key" ${ADMIN_USERNAME}@${TARGET_IP} bash -s <<'DIAG'
          echo "=== systemctl status ==="
          sudo systemctl status mumble-server --no-pager || true
          echo ""
          echo "=== last 40 journal lines ==="
          sudo journalctl -u mumble-server -n 40 --no-pager || true
          echo ""
          echo "=== listening ports (ss) ==="
          sudo ss -tlnpu | grep -E "mumble|64738" || echo "(nothing matched)"
          echo ""
          echo "=== relevant ini settings ==="
          sudo grep -E "^(port|host|database|sslCert|sslKey|dbDriver)" /etc/mumble-server.ini || true
          echo ""
          echo "=== UFW status ==="
          sudo ufw status verbose || true
          echo ""
          echo "=== TCP self-test on mumble port ==="
          timeout 5 bash -c "echo > /dev/tcp/127.0.0.1/$MUMBLE_PORT" && echo "TCP port $MUMBLE_PORT is open" || echo "TCP port $MUMBLE_PORT is NOT reachable locally"
          DIAG


