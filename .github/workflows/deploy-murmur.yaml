name: Deploy Murmur and obtain Let's Encrypt certificate

on:
  workflow_dispatch:
    inputs:
      ssh_port:
        description: 'SSH port'
        required: true
        default: '22'
      server_image:
        description: 'Droplet image (e.g., ubuntu-22-04-x64)'
        required: false
        default: 'ubuntu-22-04-x64'
      server_size:
        description: 'Droplet size (e.g., s-1vcpu-1gb)'
        required: false
        default: 's-1vcpu-1gb'
      server_name:
        description: 'Droplet name (server-name)'
        required: false
        default: 'sonic-bear-voice-chat'
      mumble_server_port:
        description: 'Mumble server port (defaults to 64738)'
        required: false
        default: '64738'
      admin_username:
        description: 'Admin SSH username'
        required: true
        default: 'sonic'
      domain:
        description: 'Domain (example.com)'
        required: true
        default: 'sonictt1.com'
      subdomain:
        description: 'Subdomain for cert and connecting (e.g., mumble)'
        required: true
        default: 'voice'
      email:
        description: 'Email for Lets Encrypt registration'
        required: true
        default: 'sonictt1@proton.me'
      region:
        description: 'DigitalOcean region (e.g., nyc3, sfo2)'
        required: true
        default: 'nyc3'

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      reserved_ip: ${{ steps.reserve.outputs.reserved_ip }}
      droplet_id: ${{ steps.inflate.outputs.droplet_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Install and authenticate doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Make scripts executable
        run: |
          chmod +x ./reserve_ip_dns_record.sh || true
          chmod +x ./inflate_murmur.sh || true
          chmod +x ./letsencrypt_cert_script.sh || true

      - name: Setup SSH identity from secret
        run: |
          # The SSH private key is provided via the repository secret `DO_SSH_PRIVATE_KEY`.
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/do_ssh_key
          chmod 600 ~/.ssh/do_ssh_key

      

      - name: Reserve IP and DNS
        id: reserve
        run: |
          set -euo pipefail
          echo "Running reserve_ip_dns_record.sh..."
          RESERVED_IP=$(./reserve_ip_dns_record.sh --domain "${{ github.event.inputs.domain }}" --subdomain "${{ github.event.inputs.subdomain }}" --region "${{ github.event.inputs.region }}")
          echo "Reserved IP: $RESERVED_IP"
          echo "reserved_ip=$RESERVED_IP" >> $GITHUB_OUTPUT

      - name: Generate UTC timestamp
        id: ts
        run: |
          set -euo pipefail
          echo "timestamp=$(date -u +'%Y-%m-%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Inflate Murmur
        id: inflate
        run: |
          set -euo pipefail
          echo "Inflating murmur with reserved IP: ${{ steps.reserve.outputs.reserved_ip }}"
          # Assign GitHub inputs/outputs into shell variables first (prevents literal '$' passing)
          RES_IP='${{ steps.reserve.outputs.reserved_ip }}'
          TS='${{ steps.ts.outputs.timestamp }}'
          TAGS="timestamp-$TS"
          SERVER_NAME='${{ github.event.inputs.server_name }}'
          MUMBLE_PORT='${{ github.event.inputs.mumble_server_port }}'

          OUTFILE=/tmp/inflate_output.txt
          # Run script and capture stdout+stderr for debugging; extract last line as droplet ID on success
          if ./inflate_murmur.sh \
            --region "${{ github.event.inputs.region }}" \
            --image "${{ github.event.inputs.server_image }}" \
            --size "${{ github.event.inputs.server_size }}" \
            --name "$SERVER_NAME" \
            --reserved-ip "$RES_IP" \
            --admin "${{ github.event.inputs.admin_username }}" \
            --identity "$HOME/.ssh/do_ssh_key" \
            --ssh-port "${{ github.event.inputs.ssh_port }}" \
            --ssh-key "${{ secrets.DO_SSH_KEY_ID }}" \
            --ssh-public-key "${{ vars.SSH_PUBLIC_KEY }}" \
            --domain "${{ github.event.inputs.domain }}" \
            --mumble-ini ./mumble-server.ini \
            -l "$MUMBLE_PORT" \
            --verbose \
            --tags "$TAGS" >"$OUTFILE" 2>&1; then
            DROPLET_ID=$(tail -n 1 "$OUTFILE")
            echo "droplet_id=$DROPLET_ID" >> $GITHUB_OUTPUT
          else
            echo "inflate_murmur.sh failed; output follows:" >&2
            sed -n '1,400p' "$OUTFILE" >&2 || true
            exit 1
          fi
          sleep 90 # Wait a bit for the droplet to be fully ready before SSH attempts

  upload-db:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH identity for DB upload
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/do_ssh_key
          chmod 600 ~/.ssh/do_ssh_key

      - name: Upload and install sqlite DB
        env:
          RESERVED_IP: ${{ needs.deploy.outputs.reserved_ip }}
          ADMIN_USERNAME: ${{ github.event.inputs.admin_username }}
          SSH_PORT: ${{ github.event.inputs.ssh_port }}
        run: |
          set -euo pipefail
          echo "Uploading local DB checksum..."
          LOCAL_DB_CHECKSUM=$(sha256sum "$GITHUB_WORKSPACE/mumble-server.sqlite" | awk '{print $1}')
          echo "Local checksum: $LOCAL_DB_CHECKSUM"

          # Upload to /tmp on the droplet
          scp -o StrictHostKeyChecking=no -P "$SSH_PORT" -i ~/.ssh/do_ssh_key "$GITHUB_WORKSPACE/mumble-server.sqlite" root@${RESERVED_IP}:/tmp/mumble-server.sqlite

          # Verify remote temp file checksum
          REMOTE_TMP_CHECKSUM=$(ssh -o StrictHostKeyChecking=no -p "$SSH_PORT" -i ~/.ssh/do_ssh_key root@${RESERVED_IP} "sha256sum /tmp/mumble-server.sqlite 2>/dev/null | awk '{print \$1}'")
          echo "Remote tmp checksum: $REMOTE_TMP_CHECKSUM"
          if [ "$REMOTE_TMP_CHECKSUM" != "$LOCAL_DB_CHECKSUM" ]; then
            echo "ERROR: upload failed or checksum mismatch ($REMOTE_TMP_CHECKSUM != $LOCAL_DB_CHECKSUM)" >&2
            exit 1
          fi

          # Atomically install DB and sidecars, run WAL checkpoint, verify via sqlite3, and start service
          ssh -o StrictHostKeyChecking=no -p "$SSH_PORT" -i ~/.ssh/do_ssh_key root@${RESERVED_IP} bash -s <<'REMOTE'
            set -euo pipefail
            DB_DEST="/var/lib/mumble-server"
            systemctl stop mumble-server || true
            mkdir -p "$DB_DEST"
            # copy main and sidecars
            for f in /tmp/mumble-server.sqlite*; do
              if [ -e "$f" ]; then
                cp -f "$f" "$DB_DEST/$(basename "$f")"
              fi
            done
            chown mumble-server:mumble-server "$DB_DEST"/mumble-server.sqlite* || true
            chmod 660 "$DB_DEST"/mumble-server.sqlite* || true

            # Verify DB contents using sqlite3; fail if verification fails
            if ! command -v sqlite3 >/dev/null 2>&1; then
              echo "ERROR: sqlite3 not installed on remote host; cannot verify DB" >&2
              exit 1
            fi

            # Ensure WAL content is checkpointed into the main DB so murmur sees latest state
            sudo -u mumble-server sqlite3 "$DB_DEST/mumble-server.sqlite" 'PRAGMA wal_checkpoint(FULL);' || true

            # Check channels table exists and has more than root channel
            CH_TABLE_EXISTS=$(sudo -u mumble-server sqlite3 "$DB_DEST/mumble-server.sqlite" "SELECT count(*) FROM sqlite_master WHERE type='table' AND name='channels';" 2>/dev/null || echo 0)
            if [ "$CH_TABLE_EXISTS" -eq 0 ]; then
              echo "ERROR: 'channels' table not found in DB" >&2
              exit 1
            fi
            CHANNELS=$(sudo -u mumble-server sqlite3 "$DB_DEST/mumble-server.sqlite" "SELECT count(*) FROM channels;" 2>/dev/null || echo 0)
            echo "[DB VERIFY] channels count: $CHANNELS"
            if [ "$CHANNELS" -lt 2 ]; then
              echo "ERROR: channels count ($CHANNELS) too small; DB may be empty" >&2
              exit 1
            fi

            rm -f /tmp/mumble-server.sqlite*
            systemctl start mumble-server || true
            sha256sum "$DB_DEST/mumble-server.sqlite"

      - name: SSH debug connection
        run: |
          set -euo pipefail
          echo "Running SSH connectivity test to ${{ github.event.inputs.admin_username }}@${{ needs.deploy.outputs.reserved_ip }}"
          SSH_OPTS=( -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -i "$HOME/.ssh/do_ssh_key" -p "${{ github.event.inputs.ssh_port }}" -vvv )
          /usr/bin/ssh "${SSH_OPTS[@]}" "${{ github.event.inputs.admin_username }}"@"${{ needs.deploy.outputs.reserved_ip }}" 'echo SSH_OK' > /tmp/ssh_debug.txt 2>&1 || { sed -n '1,400p' /tmp/ssh_debug.txt >&2 ; exit 1; }

      - name: Obtain Let's Encrypt certificate
        run: |
          set -euo pipefail
          echo "Requesting cert for mumble.${{ github.event.inputs.domain }} on ${{ needs.deploy.outputs.reserved_ip }}"
          ./letsencrypt_cert_script.sh --reserved-ip "${{ needs.deploy.outputs.reserved_ip }}" --droplet-id "${{ needs.deploy.outputs.droplet_id }}" --domain "${{ github.event.inputs.domain }}" --subdomain "${{ github.event.inputs.subdomain }}" --email "${{ github.event.inputs.email }}" --ssh-identity-file "$HOME/.ssh/do_ssh_key" --ssh-port "${{ github.event.inputs.ssh_port }}" --admin-username "${{ github.event.inputs.admin_username }}"
